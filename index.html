function weighted(b){
  return Math.round(b.saf*0.25 + b.rel*0.20 + b.com*0.20 + b.liq*0.18 + b.bod*0.10 + b.sat*0.07);
}

function Bar({v,c,bg,op}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:4}}>
      <div style={{flex:1,height:6,background:bg,borderRadius:3}}>
        <div style={{width:`${v}%`,height:"100%",background:c,borderRadius:3,opacity:op}}/>
      </div>
      <span style={{fontSize:15,fontWeight:500,minWidth:24,textAlign:"right",color:"var(--color-text-secondary)"}}>{v}</span>
    </div>
  );
}

function App(){
  const [open,setOpen]=useState(null);
  const [sort,setSort]=useState("w");
  const [filt,setFilt]=useState("all");
  const [showInfo,setShowInfo]=useState(false);
  const [theme,setTheme]=useState(()=>{try{return localStorage.getItem("carRatingTheme")||"dark"}catch(e){return "dark"}});
  const T=themes[theme];
  useEffect(()=>{Object.entries(T.vars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));try{localStorage.setItem("carRatingTheme",theme)}catch(e){}},[theme]);
  const tierCfg=T.tier;
  const mets=[
    {k:"w",lb:"Зведений",c:"var(--color-text-primary)"},
    {k:"saf",lb:"Безпека",c:T.metC[0]},
    {k:"rel",lb:"Надійність",c:T.metC[1]},
    {k:"com",lb:"Комфорт/Тех",c:T.metC[2]},
    {k:"liq",lb:"Ліквідність PL",c:T.metC[3]},
    {k:"bod",lb:"Кузов",c:T.metC[4]},
    {k:"sat",lb:"Задоволеність",c:T.metC[5]}
  ];

  const items=data.map(b=>({...b,w:weighted(b)}));
  const filtered=filt==="all"?items:items.filter(b=>b.t===filt);
  const sorted=[...filtered].sort((a,b)=>{
    const ka=sort==="w"?a.w:a[sort];
    const kb=sort==="w"?b.w:b[sort];
    return kb-ka;
  });
  const allSorted=[...items].sort((a,b)=>(sort==="w"?b.w-a.w:b[sort]-a[sort]));

  const tc={gold:0,silver:0,bronze:0,low:0};
  data.forEach(b=>tc[b.t]++);

    <div style={{fontFamily:"var(--font-sans)",maxWidth:960,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16,fontWeight:600}}>Рейтинг авто</span>
          <span style={{fontSize:13,color:"var(--color-text-tertiary)"}}>Польща / Європа</span>
          <button onClick={(e)=>{e.stopPropagation();setShowInfo(!showInfo)}} style={{width:26,height:26,borderRadius:13,border:"1px solid var(--color-border-secondary)",background:showInfo?"var(--color-text-primary)":"transparent",color:showInfo?"var(--color-background-primary)":"var(--color-text-tertiary)",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",padding:0,lineHeight:1}}>i</button>
        </div>
        <button onClick={(e)=>{e.stopPropagation();setTheme(theme==="dark"?"light":"dark")}} style={{padding:"5px 12px",fontSize:13,borderRadius:20,cursor:"pointer",background:"var(--color-background-secondary)",color:"var(--color-text-secondary)",border:"1px solid var(--color-border-secondary)",display:"flex",alignItems:"center",gap:5}}>{theme==="dark"?"\u2600\ufe0f Світла":"\u{1F319} Темна"}</button>
      </div>
      {showInfo&&(
        <div style={{background:"var(--color-background-secondary)",borderRadius:8,padding:"10px 14px",marginBottom:10,fontSize:14,lineHeight:1.7,color:"var(--color-text-secondary)"}}>
          <div style={{fontWeight:500,marginBottom:4,color:"var(--color-text-primary)"}}>Ваги зведеного балу:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"4px 16px"}}>
            <span>Безпека <b>25%</b></span>
            <span>Надійність <b>20%</b></span>
            <span>Комфорт/Тех <b>20%</b></span>
            <span>Ліквідність PL <b>18%</b></span>

        {[{k:"all",l:"Усі"},{k:"gold",l:"Лідери"},{k:"silver",l:"Сильні"},{k:"bronze",l:"Середн."},{k:"low",l:"Аутсайд."}].map(f=>(
          <button key={f.k} onClick={()=>setFilt(f.k)} style={{
            padding:"4px 10px",fontSize:14,borderRadius:14,cursor:"pointer",
            background:filt===f.k?"var(--color-text-primary)":"transparent",
            color:filt===f.k?"var(--color-background-primary)":"var(--color-text-secondary)",
            border:`1px solid ${filt===f.k?"var(--color-text-primary)":"var(--color-border-secondary)"}`

        {mets.map(m=>(
          <button key={m.k} onClick={()=>setSort(m.k)} style={{
            padding:"4px 9px",fontSize:13,borderRadius:6,cursor:"pointer",
            background:sort===m.k?"var(--color-background-card)":"transparent",
            color:sort===m.k?m.c:"var(--color-text-tertiary)",fontWeight:sort===m.k?600:400,
            border:`1px solid ${sort===m.k?"var(--color-border-secondary)":"transparent"}`
          }}>{m.lb}</button>
        ))}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {sorted.map((b,i)=>{
          const t=tierCfg[b.t];
          const isOpen=open===b.n;
          const rank=allSorted.findIndex(x=>x.n===b.n)+1;

            <div key={b.n} onClick={()=>setOpen(isOpen?null:b.n)} style={{

              </div>

              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:"3px 8px",marginTop:8}}>
                {[{k:"saf",l:"Безпека",c:T.metC[0]},{k:"rel",l:"Надійн",c:T.metC[1]},{k:"com",l:"Комф/Тех",c:T.metC[2]},{k:"liq",l:"Лікв PL",c:T.metC[3]},{k:"bod",l:"Кузов",c:T.metC[4]},{k:"sat",l:"Задовол",c:T.metC[5]}].map(m=>(
                  <div key={m.k}><span style={{fontSize:13,color:"var(--color-text-tertiary)"}}>{m.l}</span><Bar v={b[m.k]} c={m.c} bg={T.barBg} op={T.barOp}/></div>
                ))}
              </div>

              {isOpen&&(
                <div style={{marginTop:12,borderTop:"0.5px solid var(--color-border-tertiary)",paddingTop:10,fontSize:16,lineHeight:1.65}}>
                  <div style={{background:"var(--color-background-secondary)",borderRadius:6,padding:"6px 10px",marginBottom:8,fontSize:15}}>
                    <span style={{fontWeight:500}}>Польща 2025:</span> {b.plRank}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:8}}>
                    {[
                      {k:"saf",l:`Безпека (${b.saf})`,c:T.det[0].c,tc:T.det[0].tc},
                      {k:"rel",l:`Надійність (${b.rel})`,c:T.det[1].c,tc:T.det[1].tc},
                      {k:"com",l:`Комфорт/Тех (${b.com})`,c:T.det[2].c,tc:T.det[2].tc},
                      {k:"liq",l:`Ліквідність PL (${b.liq})`,c:T.det[3].c,tc:T.det[3].tc},
                      {k:"bod",l:`Кузов (${b.bod})`,c:T.det[4].c,tc:T.det[4].tc},
                      {k:"sat",l:`Задоволеність (${b.sat})`,c:T.det[5].c,tc:T.det[5].tc}
                    ].map(s=>(
                      <div key={s.k} style={{background:s.c,borderRadius:6,padding:"6px 8px"}}>
                        <div style={{fontSize:13,color:s.tc,fontWeight:500,marginBottom:2}}>{s.l}</div>
                        <div style={{fontSize:15,color:"var(--color-text-secondary)"}}>{b.d[s.k]}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
