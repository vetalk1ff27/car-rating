  bronze:{bg:"#F1EFE8",brd:"#B4B2A9",tx:"#444441",lb:"Середняки"},
  low:{bg:"#FCEBEB",brd:"#F09595",tx:"#791F1F",lb:"Аутсайдери"}
};

const mets = [
  {k:"w",lb:"Зведений",c:"var(--color-text-primary)"},
  {k:"saf",lb:"Безпека",c:"#534AB7"},
  {k:"rel",lb:"Надійність",c:"#1D9E75"},
  {k:"com",lb:"Комфорт/Тех",c:"#D85A30"},
  {k:"liq",lb:"Ліквідність PL",c:"#378ADD"},
  {k:"bod",lb:"Кузов",c:"#BA7517"},
  {k:"sat",lb:"Задоволеність",c:"#993556"}
];

function weighted(b){
  return Math.round(b.saf*0.25 + b.rel*0.20 + b.com*0.20 + b.liq*0.18 + b.bod*0.10 + b.sat*0.07);
}

function Bar({v,c}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:4}}>
      <div style={{flex:1,height:6,background:"rgba(128,128,128,0.1)",borderRadius:3}}>
        <div style={{width:`${v}%`,height:"100%",background:c,borderRadius:3}}/>
      </div>
      <span style={{fontSize:11,fontWeight:500,minWidth:22,textAlign:"right"}}>{v}</span>
    </div>
  );
}

function App(){
  const [open,setOpen]=useState(null);
  const [sort,setSort]=useState("w");
  const [filt,setFilt]=useState("all");

  const items=data.map(b=>({...b,w:weighted(b)}));
  const filtered=filt==="all"?items:items.filter(b=>b.t===filt);
  const sorted=[...filtered].sort((a,b)=>{
    const ka=sort==="w"?a.w:a[sort];
    const kb=sort==="w"?b.w:b[sort];
    return kb-ka;
  });
  const allSorted=[...items].sort((a,b)=>(sort==="w"?b.w-a.w:b[sort]-a[sort]));

  const tc={gold:0,silver:0,bronze:0,low:0};
  data.forEach(b=>tc[b.t]++);

  return(
    <div style={{fontFamily:"var(--font-sans)",maxWidth:720,margin:"0 auto"}}>
      <div style={{background:"var(--color-background-secondary)",borderRadius:8,padding:"10px 14px",marginBottom:10,fontSize:12,lineHeight:1.6}}>
        <div style={{color:"var(--color-text-secondary)"}}><b>Ринок:</b> Польща / Європа &nbsp;|&nbsp; <b>Ваги:</b> Безпека 25% → Надійність 20% = Комфорт 20% → Ліквідність PL 18% → Кузов 10% → Задоволеність 7%</div>
      </div>

      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
        {[{k:"all",l:"Усі"},{k:"gold",l:"Лідери"},{k:"silver",l:"Сильні"},{k:"bronze",l:"Середн."},{k:"low",l:"Аутсайд."}].map(f=>(
          <button key={f.k} onClick={()=>setFilt(f.k)} style={{
            padding:"3px 9px",fontSize:11,borderRadius:14,cursor:"pointer",
            background:filt===f.k?"var(--color-text-primary)":"transparent",
            color:filt===f.k?"var(--color-background-primary)":"var(--color-text-secondary)",
            border:`1px solid ${filt===f.k?"var(--color-text-primary)":"var(--color-border-secondary)"}`
          }}>{f.l} {f.k==="all"?data.length:tc[f.k]||0}</button>
        ))}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12}}>
        <span style={{fontSize:10,color:"var(--color-text-tertiary)",lineHeight:"22px"}}>Сорт:</span>
        {mets.map(m=>(
          <button key={m.k} onClick={()=>setSort(m.k)} style={{
            padding:"2px 7px",fontSize:10,borderRadius:5,cursor:"pointer",
            background:sort===m.k?"var(--color-background-secondary)":"transparent",
            color:sort===m.k?m.c:"var(--color-text-tertiary)",fontWeight:sort===m.k?500:400,
            border:`0.5px solid ${sort===m.k?"var(--color-border-secondary)":"transparent"}`
          }}>{m.lb}</button>
        ))}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {sorted.map((b,i)=>{
          const t=tierCfg[b.t];
          const isOpen=open===b.n;
          const rank=allSorted.findIndex(x=>x.n===b.n)+1;
          return(
            <div key={b.n} onClick={()=>setOpen(isOpen?null:b.n)} style={{
              background:"var(--color-background-primary)",
              border:"0.5px solid var(--color-border-tertiary)",
              borderLeft:`4px solid ${t.brd}`,
              borderRadius:"0 10px 10px 0",
              padding:"10px 13px",cursor:"pointer"
            }}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontSize:13,fontWeight:500,minWidth:22,color:"var(--color-text-secondary)"}}>#{rank}</span>
                  <span style={{fontSize:16}}>{b.f}</span>
                  <span style={{fontSize:14,fontWeight:500}}>{b.n}</span>
                  <span style={{fontSize:9,padding:"1px 6px",borderRadius:8,background:t.bg,color:t.tx,fontWeight:500}}>{t.lb}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:17,fontWeight:500}}>{sort==="w"?b.w:b[sort]}</span>
                  <span style={{fontSize:9,color:"var(--color-text-tertiary)",transform:isOpen?"rotate(180deg)":"",transition:"transform 0.2s",display:"inline-block"}}>▼</span>
                </div>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:"2px 6px",marginTop:7}}>
                {[{k:"saf",l:"Безпека",c:"#534AB7"},{k:"rel",l:"Надійн",c:"#1D9E75"},{k:"com",l:"Комф/Тех",c:"#D85A30"},{k:"liq",l:"Лікв PL",c:"#378ADD"},{k:"bod",l:"Кузов",c:"#BA7517"},{k:"sat",l:"Задовол",c:"#993556"}].map(m=>(
                  <div key={m.k}><span style={{fontSize:8,color:"var(--color-text-tertiary)"}}>{m.l}</span><Bar v={b[m.k]} c={m.c}/></div>
                ))}
              </div>

              {isOpen&&(
                <div style={{marginTop:12,borderTop:"0.5px solid var(--color-border-tertiary)",paddingTop:10,fontSize:12,lineHeight:1.65}}>
                  <div style={{background:"var(--color-background-secondary)",borderRadius:6,padding:"6px 10px",marginBottom:8,fontSize:11}}>
                    <span style={{fontWeight:500}}>Польща 2025:</span> {b.plRank}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:8}}>
                    {[
                      {k:"saf",l:`Безпека (${b.saf})`,c:"rgba(83,74,183,0.06)",tc:"#3C3489"},
                      {k:"rel",l:`Надійність (${b.rel})`,c:"rgba(29,158,117,0.06)",tc:"#0F6E56"},
                      {k:"com",l:`Комфорт/Тех (${b.com})`,c:"rgba(216,90,48,0.06)",tc:"#993C1D"},
                      {k:"liq",l:`Ліквідність PL (${b.liq})`,c:"rgba(55,138,221,0.06)",tc:"#185FA5"},
                      {k:"bod",l:`Кузов (${b.bod})`,c:"rgba(186,117,23,0.06)",tc:"#854F0B"},
                      {k:"sat",l:`Задоволеність (${b.sat})`,c:"rgba(153,53,86,0.06)",tc:"#72243E"}
                    ].map(s=>(
                      <div key={s.k} style={{background:s.c,borderRadius:6,padding:"6px 8px"}}>
                        <div style={{fontSize:9,color:s.tc,fontWeight:500,marginBottom:2}}>{s.l}</div>
                        <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{b.d[s.k]}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <p style={{fontSize:9,color:"var(--color-text-tertiary)",marginTop:12,lineHeight:1.5}}>
        Адаптовано під Польщу: ліквідність = реєстрації SAMAR 2025 + мережа дилерів + попит на OTOMOTO. Buick прибрано (немає в Європі). Ford — лише європейська лінійка.
        Джерела: CR 2026 | JD Power VDS 2026 & IQS 2025 | KBB & CarEdge 2026 | Euro NCAP 2024–2025 | IIHS 2025 | What Car? UK 2025 | SAMAR.pl 2025 | Driver Power UK 2025.
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
